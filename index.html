<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CJohn Lin - Personal Portfolio">
    <title>CJohn Lin | Personal Portfolio</title>
    <!-- Modern Sans-serif Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Link to external CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Inspired by 'Knuford' Template Layout -->
    <nav>
        <a href="#" class="logo">CJohn<span>Lin</span></a>
    </nav>

    <!-- Background Animated Shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <section class="hero" id="home">
        <div class="hero-content">
            <div class="greeting">Welcome to my world</div>
            <h1 class="title">Hi, I'm CJohn Lin</h1>

            <div class="typewriter">
                I am a passionate <span id="typewriter-text"></span>
            </div>

            <div class="clock-widget">
                <div class="time-box">
                    <span id="hours">00</span><span class="colon">:</span><span id="minutes">00</span><span
                        class="colon">:</span><span id="seconds">00</span>
                </div>
                <div class="date-box">
                    <div class="date-day" id="day">Loading</div>
                    <div class="date-full" id="date">--</div>
                </div>
            </div>
        </div>

        <a href="#home" class="scroll-down">
            <span>Scroll</span>
            <div class="mouse"></div>
        </a>
    </section>

    <!-- Link to external JS -->
    <script src="script.js"></script>
</body>

</html>
